# Prefer classic node_modules over PnP to reduce friction with Next.js tooling
nodeLinker: node-modules

# Use a global cache to speed up installs
enableGlobalCache: true

# Set npm registry for Next.js compatibility (Next.js tries to read this)
npmRegistryServer: 'https://registry.npmjs.org'

# Install SWC binaries for all platforms so Next.js lockfile patching
# doesn't complain about missing entries (macOS arm64 local + Linux for Vercel)
supportedArchitectures:
  os: ['current', 'linux']
  cpu: ['current', 'x64', 'arm64']
  libc: ['current', 'glibc', 'musl']
